name: Publish npm (WASM)

# GitHub Releases が公開されたときに npm へ公開する。
# 事前準備: リポジトリの Settings > Secrets に NPM_TOKEN を登録すること。
# npm の Access Token は https://www.npmjs.com/settings/<user>/tokens で発行。

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release tag matches package versions
        shell: bash
        run: ./scripts/verify_release_versions.sh "${{ github.event.release.tag_name }}"

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Clean Rust build outputs
        run: cargo clean --manifest-path Cargo.toml

      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build WASM package (nodejs target)
        run: wasm-pack build --target nodejs --release crates/j-law-wasm

      - name: Run WASM binding tests
        run: node --test crates/j-law-wasm/tests/*.test.mjs

      - name: Publish to npm
        run: npm publish --access public
        working-directory: crates/j-law-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
