name: Publish npm (WASM)

# GitHub Releases が公開されたときに npm へ公開する。
# 事前準備: npm 側で Trusted Publisher (Provenance) を有効化すること。
#   1. npmjs.com のパッケージ設定 > Publishing access > Require provenance を推奨
#   2. GitHub environment "npm" を作成（任意: 保護ルールを追加）

on:
  release:
    types: [published]

jobs:
  build:
    name: Build WASM package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify release tag matches package versions
        shell: bash
        run: ./scripts/verify_release_versions.sh "${{ github.event.release.tag_name }}"

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Clean Rust build outputs
        run: cargo clean --manifest-path Cargo.toml

      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build WASM package (nodejs target)
        run: wasm-pack build --target nodejs --release crates/j-law-wasm

      - name: Run WASM binding tests
        run: node --test crates/j-law-wasm/tests/*.test.mjs

      - uses: actions/upload-artifact@v6
        with:
          name: npm-package
          path: crates/j-law-wasm/pkg

  publish:
    name: Publish to npm
    needs: [build]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v7
        with:
          name: npm-package
          path: pkg

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: pkg
