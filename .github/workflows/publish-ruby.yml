name: Publish Ruby gem (RubyGems)

# GitHub Releases が公開されたときに RubyGems へ公開する。
# 事前準備: リポジトリの Settings > Secrets に RUBYGEMS_API_KEY を登録すること。
# RubyGems の API Key は https://rubygems.org/profile/edit で発行。

on:
  release:
    types: [published]

jobs:
  # --- プラットフォームごとにネイティブ gem をビルド ---
  build-gem:
    name: Build native gem (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-ruby-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ruby-

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install libclang (Linux のみ)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install dependencies
        working-directory: crates/j-law-ruby
        run: bundle install

      - name: Compile native extension
        working-directory: crates/j-law-ruby
        run: bundle exec rake compile

      - name: Build gem
        working-directory: crates/j-law-ruby
        run: gem build j_law_core.gemspec

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.os }}
          path: crates/j-law-ruby/*.gem

  # --- RubyGems へ公開 ---
  publish:
    name: Publish to RubyGems
    needs: build-gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: gems

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials

      - name: Publish gems
        run: |
          for gem in gems/*.gem; do
            echo "Publishing $gem ..."
            gem push "$gem"
          done
