name: Publish Ruby gem (RubyGems)

# GitHub Releases が公開されたときに RubyGems へ公開する。
# 事前準備: RubyGems 側で Trusted Publisher を設定し、
# job.environment と一致する environment 名を登録すること。

on:
  release:
    types: [published]

jobs:
  build-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release tag matches package versions
        run: ./scripts/verify_release_versions.sh "${{ github.event.release.tag_name }}"

      - uses: dtolnay/rust-toolchain@1.94.0

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-ruby-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ruby-

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install dependencies
        working-directory: crates/j-law-ruby
        run: bundle install

      - name: Run Ruby tests
        working-directory: crates/j-law-ruby
        run: bundle exec rake test

      - name: Build gem
        working-directory: crates/j-law-ruby
        run: bundle exec rake build

      - uses: actions/upload-artifact@v4
        with:
          name: ruby-source-gem
          path: crates/j-law-ruby/*.gem

  publish:
    name: Publish to RubyGems
    needs: build-gem
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: gems

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Configure RubyGems trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Publish gems
        run: |
          for gem in gems/*.gem; do
            echo "Publishing $gem ..."
            gem push "$gem"
          done
