name: Publish Ruby gem (RubyGems)

on:
  release:
    types: [published]

jobs:
  build-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-ruby-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ruby-

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install dependencies
        working-directory: crates/j-law-ruby
        run: bundle install

      - name: Run Ruby tests
        working-directory: crates/j-law-ruby
        run: bundle exec rake test

      - name: Build gem
        working-directory: crates/j-law-ruby
        run: bundle exec rake build

      - uses: actions/upload-artifact@v4
        with:
          name: ruby-source-gem
          path: crates/j-law-ruby/*.gem

  publish:
    name: Publish to RubyGems
    needs: build-gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: gems

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials

      - name: Publish gems
        run: |
          for gem in gems/*.gem; do
            echo "Publishing $gem ..."
            gem push "$gem"
          done
