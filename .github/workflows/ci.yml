# このCIはAGENTS.mdのコーディングルールを自動検証します。

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sync-go-native:
    name: Sync Go native archives
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-sync-go-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sync-go-

      - name: Sync all native archives
        working-directory: crates/j-law-go
        run: make sync-native-all

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/j-law-go/native/
          if git diff --cached --quiet; then
            echo "No changes to Go native archives"
          else
            git commit -m "chore: sync Go native archives"
            git push
          fi

  lint:
    name: Lint
    needs: sync-go-native
    if: always() && (needs.sync-go-native.result == 'success' || needs.sync-go-native.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
      - name: Verify published package versions are aligned
        run: ./scripts/verify_release_versions.sh
      - name: Check format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Verify all vendored Go native archives
        working-directory: crates/j-law-go
        run: make verify-native-all

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &>/dev/null; then
            cargo install cargo-audit --locked
          fi
      - name: Security audit
        run: cargo audit

  test-python-bindings:
    name: Test Binding (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: test-rust
    strategy:
      # Officially supported CPython branches:
      # https://devguide.python.org/versions/
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            crates/j-law-python/pyproject.toml
            crates/j-law-python/setup.py
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-python-${{ matrix.python-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-${{ matrix.python-version }}-
      - name: Install Python binding and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ./crates/j-law-python
      - name: Run Python binding tests
        run: pytest crates/j-law-python/tests/ -v

  test-wasm-bindings:
    name: Test Binding (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test-rust
    strategy:
      # Published npm package targets currently supported Node.js release lines.
      matrix:
        node-version: ["20", "22", "24"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ matrix.node-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-${{ matrix.node-version }}-
      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Build WASM package
        run: wasm-pack build --target nodejs crates/j-law-wasm
      - name: Run WASM binding tests
        run: node --test crates/j-law-wasm/tests/*.test.mjs

  test-ruby-bindings:
    name: Test Binding (Ruby ${{ matrix.ruby-version }})
    runs-on: ubuntu-latest
    needs: test-rust
    strategy:
      # Test the minimum supported Ruby plus current maintained branches.
      matrix:
        ruby-version: ["3.1", "3.2", "3.3", "3.4", "4.0"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-ruby-${{ matrix.ruby-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ruby-${{ matrix.ruby-version }}-
      - name: Install Ruby dependencies
        working-directory: crates/j-law-ruby
        run: bundle install
      - name: Run Ruby binding tests
        working-directory: crates/j-law-ruby
        run: bundle exec rake test
      - name: Build Ruby gems
        if: matrix.ruby-version == '3.1'
        working-directory: crates/j-law-ruby
        run: |
          bundle exec rake build_source_gem
          bundle exec rake build_binary_gem

  test-go-bindings:
    name: Test Binding (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: test-rust
    strategy:
      # Test the minimum declared Go version and each subsequent supported minor line.
      matrix:
        go-version: ["1.21", "1.22", "1.23", "1.24", "1.25", "1.26"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: crates/j-law-go/go.mod
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-go-${{ matrix.go-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-go-${{ matrix.go-version }}-
      - name: Run Go binding tests
        working-directory: crates/j-law-go
        run: |
          make verify-native
          make test
