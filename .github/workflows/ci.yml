# このCIはAGENTS.mdのコーディングルールを自動検証します。
# Rule 2チェック（panic!禁止）は rounding.rs:21 の assert! 修正まで失敗します。

name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Check format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run workspace tests
        run: cargo test --workspace
      - name: "AGENTS Rule 1: f64/f32 禁止チェック"
        run: |
          if grep -r 'f64\|f32' crates/j-law-core/src/; then
            echo "❌ FAIL: f64/f32 found in j-law-core"
            exit 1
          fi
          echo "✅ OK: No floats in j-law-core"
      - name: "AGENTS Rule 2: panic!/unwrap()/expect() 禁止チェック (コア層)"
        run: |
          if grep -rn 'panic!\|\.unwrap()\|\.expect(' crates/j-law-core/src/; then
            echo "❌ FAIL: panic!/unwrap()/expect() found in j-law-core"
            exit 1
          fi
          echo "✅ OK: No panic!/unwrap()/expect() in j-law-core"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &>/dev/null; then
            cargo install cargo-audit --locked
          fi
      - name: Security audit
        run: cargo audit

  test-bindings:
    name: Test Bindings (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test-rust
    strategy:
      matrix:
        service: [test-python, test-wasm, test-ruby, test-go]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ hashFiles('**/Dockerfile*', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-
      - name: "Build and test (${{ matrix.service }})"
        run: docker compose up ${{ matrix.service }} --build --exit-code-from ${{ matrix.service }}
