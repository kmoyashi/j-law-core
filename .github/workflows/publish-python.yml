name: Publish Python (PyPI)

on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Verify release tag matches package versions
        shell: bash
        run: ./scripts/verify_release_versions.sh "${{ github.event.release.tag_name }}"
      - if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@1.94.0
      - name: Add macOS cross-compilation target
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin
      - name: Clean Rust build outputs
        run: cargo clean --manifest-path Cargo.toml
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD_FRONTEND: build
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10"
          CIBW_TEST_COMMAND: 'python -c "import datetime; from j_law_python.consumption_tax import calc_consumption_tax; assert calc_consumption_tax(100_000, datetime.date(2024, 1, 1)).tax_amount == 10_000"'
          CIBW_BEFORE_ALL_LINUX: "curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal && $HOME/.cargo/bin/rustup toolchain install 1.94.0 --profile minimal && $HOME/.cargo/bin/rustup default 1.94.0"
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH RUSTUP_TOOLCHAIN=1.94.0"
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=$([[ "$ARCHFLAGS" == *arm64* ]] && echo '11.0' || echo '10.12')
        with:
          package-dir: crates/j-law-python
          output-dir: dist
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify release tag matches package versions
        shell: bash
        run: ./scripts/verify_release_versions.sh "${{ github.event.release.tag_name }}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build source distribution
        run: |
          pip install build
          python -m build crates/j-law-python --sdist --outdir dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
