name: Publish Java (Maven Central)

on:
  release:
    types: [published]

jobs:
  build-native:
    name: Build native (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: windows-latest
            arch: x86_64
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-java-release-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-release-${{ matrix.arch }}-
            ${{ runner.os }}-cargo-
      - if: runner.os != 'Windows'
        name: Build JNI library (Unix)
        working-directory: crates/j-law-java
        run: ./gradlew --no-daemon -PnativeProfile=release nativeLib
      - if: runner.os == 'Windows'
        name: Build JNI library (Windows)
        working-directory: crates/j-law-java
        run: .\gradlew.bat --no-daemon -PnativeProfile=release nativeLib
      - uses: actions/upload-artifact@v4
        with:
          name: java-native-${{ matrix.runner }}-${{ matrix.arch }}
          path: crates/j-law-java/build/native

  publish:
    name: Publish to Maven Central
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-java-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-java-publish-
            ${{ runner.os }}-cargo-
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: crates/j-law-java/build/prebuilt-native
      - name: Publish package
        working-directory: crates/j-law-java
        env:
          MAVEN_CENTRAL_URL: ${{ secrets.MAVEN_CENTRAL_URL }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          ./gradlew --no-daemon -Pversion="$VERSION" -PnativeProfile=release publish
